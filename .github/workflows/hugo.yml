name: Hugo Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Remove stale submodule references (if any)
        run: |
          echo "Cleaning stale .gitmodules and submodule config"
          rm -f .gitmodules
          git config --local --remove-section submodule.themes/ananke || true
          rm -rf .git/modules/themes/ananke || true
          rm -rf themes/ananke/.git || true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Download Theme (Ananke)
        run: |
          mkdir -p themes
          git clone --depth=1 https://github.com/theNewDynamic/gohugo-theme-ananke.git themes/ananke

      - name: Build Site
        run: |
          hugo --minify
          ls -al public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
