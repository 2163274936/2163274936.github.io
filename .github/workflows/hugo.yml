name: Hugo Build and Deploy
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0
          
      - name: Clean up theme directory
        run: |
          echo "清理主题目录..."
          rm -rf themes/ananke
          mkdir -p themes
          
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true
          
      - name: Get Theme
        run: |
          echo "克隆 Ananke 主题..."
          git clone --depth=1 https://github.com/theNewDynamic/gohugo-theme-ananke.git themes/ananke
          echo "主题目录内容:"
          ls -al themes/ananke
          
      - name: Build
        env:
          HUGO_ENV: production
        run: |
          hugo version
          hugo --minify
          echo "构建结果:"
          ls -al public
          
          # 检查 CNAME 文件是否存在（关键改进点）
          if [ -f "public/CNAME" ]; then
            echo "CNAME 文件存在:"
            cat public/CNAME
          else
            echo "CNAME 文件不存在，从 static 目录复制..."
            cp static/CNAME public/CNAME
          fi
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true