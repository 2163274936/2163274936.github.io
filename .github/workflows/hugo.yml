name: Hugo Build and Deploy
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false  # 明确禁用子模块
          fetch-depth: 0
          
      - name: Clean up submodule config
        run: |
          # 确保没有残留的子模块配置
          if [ -f ".gitmodules" ]; then
            echo "删除 .gitmodules 文件"
            rm .gitmodules
          fi
          git config --local --unset-all submodule.themes/ananke.url || true
          
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true
          
      - name: Get Theme
        run: |
          mkdir -p themes
          git clone https://github.com/theNewDynamic/gohugo-theme-ananke.git themes/ananke
          
      - name: Build
        env:
          HUGO_ENV: production
        run: |
          hugo version
          hugo --minify --verbose
          echo "构建结果:"
          ls -al public
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true  # 强制创建独立分支