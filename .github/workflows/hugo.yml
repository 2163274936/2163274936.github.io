name: Hugo Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 保留提交历史
          submodules: false  # 禁用子模块

      - name: Remove stale submodule references (if any)
        run: |
          rm -f .gitmodules
          git config --local --remove-section submodule.themes/ananke || true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Get Theme (Ananke)
        run: |
          mkdir -p themes
          git clone --depth=1 https://github.com/theNewDynamic/gohugo-theme-ananke.git themes/ananke

      - name: Build site with Hugo
        run: |
          hugo --minify
          ls -al public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
